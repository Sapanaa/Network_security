name: Network Security CI/CD Pipeline

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Install dev tools
        run: |
          pip install flake8 black pytest

      - name: Lint code
        run: flake8 . --exclude build,__pycache__,.venv --ignore E501,F401,E402,E401,F841,W291,E266

      - name: Check formatting
        run: black --check .

      - name: Run tests
        run: pytest